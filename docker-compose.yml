services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: loyalty_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: loyalty_db
      POSTGRES_USER: loyalty
      POSTGRES_PASSWORD: loyalty
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U loyalty -d loyalty_db']
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: loyalty_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: loyalty_api
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - infra/.env.docker
    environment:
      DATABASE_URL: postgresql://loyalty:loyalty@postgres:5432/loyalty_db
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      API_PORT: '4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Web ────────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: loyalty_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000/api/v1
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
